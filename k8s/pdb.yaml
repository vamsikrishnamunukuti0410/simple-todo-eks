apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: todo-app
spec:
  minAvailable: 1  # Always keep at least 1 backend pod running
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: todo-app
spec:
  minAvailable: 1  # Always keep at least 1 frontend pod running
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mongodb-pdb
  namespace: todo-app
spec:
  minAvailable: 1  # Keep MongoDB running during maintenance
  selector:
    matchLabels:
      app: mongodb
