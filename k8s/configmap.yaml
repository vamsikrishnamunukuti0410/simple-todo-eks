apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: todo-app
data:
  # Database configuration
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DATABASE: "todos"
  
  # Application settings
  PORT: "5000"
  NODE_ENV: "production"
  
  # Logging
  LOG_LEVEL: "info"
  ENABLE_LOGGING: "true"
  
  # Performance
  MAX_CONNECTIONS: "100"
  REQUEST_TIMEOUT: "30000"
  
  # CORS
  ALLOWED_ORIGINS: "*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: todo-app
data:
  # Backend API endpoint
  BACKEND_URL: "http://backend:5000"
  
  # UI settings
  APP_TITLE: "Production Todo App"
  THEME: "light"
